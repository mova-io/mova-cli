api_version: movate/v1
kind: Skill

name: sim-record-benchmark
version: 0.1.0
description: >-
  Record one benchmark comparison verdict (winner + per-candidate
  scores) as an auditable `{system: eval, action: benchmark}` row in
  the shared sim_side_effects ledger and return a one-line confirmation.
  The certification suite asserts the row exists exactly once per
  benchmark run. SELF-CONTAINED for the deployed temporal-worker image
  (ADR 097 D2): the implementation lives in impl.py next to this file.

schema:
  input: ./schema/input.json
  output: ./schema/output.json

implementation:
  kind: python
  entry: "sim-record-benchmark.impl:run"

cost:
  per_call_usd: 0.0

side_effects: mutates-state

tags:
  - eval
  - simulation
  - certification
