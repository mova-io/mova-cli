api_version: movate/v1
kind: Agent
name: rejected
version: 0.1.0
description: >-
  Tells the change owner the stage did NOT complete: a human declined
  the staging sign-off / production approval, or the stage value was
  not one of test/staging/production (the gate fails safe). Terminal
  node for every rejected path.
model:
  provider: openai/gpt-4o-mini
  params: {temperature: 0.0}
prompt: ./prompt.md
schema: {input: ./schema/input.json, output: ./schema/output.json}
evals: {dataset: ./evals/dataset.jsonl}
