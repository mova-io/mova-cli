api_version: movate/v1
kind: Skill

name: sim-crm-update
version: 0.1.0
description: >-
  Simulate updating the CRM record for the requested action: records one
  auditable `{system: salesforce, action: update_record}` row to the shared
  sim_side_effects ledger (same DB MDK itself uses) and returns a one-line
  confirmation. SELF-CONTAINED for the deployed temporal-worker image (ADR
  097 D2): the implementation lives in impl.py next to this file — the python
  backend puts the skill dir's parent on sys.path, so `sim-crm-update.impl`
  imports from the baked workflows/ tree without certification/ being
  present.

schema:
  input: ./schema/input.json
  output: ./schema/output.json

implementation:
  kind: python
  entry: "sim-crm-update.impl:run"

cost:
  per_call_usd: 0.0

side_effects: mutates-state

tags:
  - salesforce
  - simulation
  - certification
