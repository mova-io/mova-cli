api_version: movate/v1
kind: Agent
name: synthesize
version: 0.1.0
description: >-
  Merges the three specialists' findings into a conclusion with a calibrated
  confidence, explicitly acknowledging any disagreement between sources.
model:
  provider: openai/gpt-4o-mini
  params: {temperature: 0.0}
prompt: ./prompt.md
schema: {input: ./schema/input.json, output: ./schema/output.json}
evals: {dataset: ./evals/dataset.jsonl}
