api_version: movate/v1
kind: Workflow
name: expense-approval
version: 0.1.0
description: >
  Tiered expense approval. CERTIFICATION FINDINGS (the authoring tax to express
  one standard enterprise workflow): (1) #47 CLOSED — the AMOUNT tier routes on
  a deterministic `decision` node (ADR 094), no LLM; (2) #49 CLOSED — exclusive
  convergence (ADR 098) lets all three approval paths SHARE one
  `post-erp`/`finalize`/`rejected` tail (was 13 nodes with 3 ERP-poster copies;
  every shared step exists once); (3) #48 CLOSED — HUMAN gates route directly
  on the approver's structured `decision` (ADR 099): approve/reject is
  deterministic (trim+casefold exact match, unmatched fails safe to rejected),
  the two `*-decision` LLM intent-routers are GONE (was 8 nodes; now 6), and
  ZERO LLM classifiers remain on the approval path.
state_schema: ../../state.json
entrypoint: classify
nodes:
  # #47 CLOSED: deterministic value routing on the expense amount — no LLM, and
  # on Temporal no activity (ADR 094). Replaces the old LLM tier-classifier.
  - id: classify
    type: decision
    cases:
      - when: {field: amount, op: gt, value: 5000}
        to: director-approval
      - when: {field: amount, op: gt, value: 100}
        to: manager-approval
    default: post-erp
  # --- #48 CLOSED: the HUMAN gates route their OWN decision (ADR 099) — no
  # --- `*-decision` intent-router, no classifier LLM; prose fails safe.
  - id: manager-approval
    type: human
    prompt: >
      Approve (manager)? Respond with `decision` set to exactly "approve" or
      "reject" — any other wording is treated as reject.
    output_contract: [decision]
    routes: {approve: post-erp, reject: rejected}
    fallback: rejected
  - id: director-approval
    type: human
    prompt: >
      Approve (director, >$5000)? Respond with `decision` set to exactly
      "approve" or "reject" — any other wording is treated as reject.
    output_contract: [decision]
    routes: {approve: post-erp, reject: rejected}
    fallback: rejected
  # --- #49 CLOSED: the shared tail (exclusive convergence, ADR 098). One
  # --- ERP-post, one finalize, one rejected — regardless of tier count.
  - {id: post-erp, type: agent, ref: ../../agents/erp-poster}
  - {id: finalize, type: agent, ref: ../../agents/finalize}
  - {id: rejected, type: agent, ref: ../../agents/rejected}
edges:
  - {from: post-erp, to: finalize}
