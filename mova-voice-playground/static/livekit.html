<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mova-iO LiveKit Voice Demo</title>
<style>
:root { --bg:#0d1117; --panel:#161b22; --text:#e6edf3; --muted:#8b949e;
        --accent:#2f81f7; --ok:#3fb950; --err:#f85149; --border:#30363d; }
* { box-sizing:border-box; margin:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
       background:var(--bg); color:var(--text); min-height:100vh;
       display:flex; flex-direction:column; align-items:center; -webkit-font-smoothing:antialiased; }
header { width:100%; padding:14px 24px; background:#0c1a3d; color:#fff;
         display:flex; align-items:center; gap:12px; border-bottom:1px solid rgba(255,255,255,0.08); }
.brand-logo { height:32px; width:auto; }
header h1 { font-size:18px; font-weight:600; }
header .tag { font-size:11px; background:var(--accent); color:#fff; padding:2px 8px;
              border-radius:10px; margin-left:8px; }
main { width:100%; max-width:560px; padding:32px 20px; display:flex; flex-direction:column; gap:20px; }
.card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:20px; }
.status { display:flex; align-items:center; gap:8px; font-size:14px; }
.dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.dot.off { background:var(--muted); }
.dot.connecting { background:var(--accent); animation:pulse 1s infinite; }
.dot.on { background:var(--ok); }
.dot.error { background:var(--err); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.btn-row { display:flex; gap:10px; margin-top:12px; }
button { font-family:inherit; font-size:14px; font-weight:500; padding:10px 20px;
         border:none; border-radius:8px; cursor:pointer; transition:opacity .15s; }
button:disabled { opacity:.4; cursor:not-allowed; }
button:hover:not(:disabled) { opacity:.85; }
#btn-connect { background:var(--accent); color:#fff; }
#btn-disconnect { background:var(--err); color:#fff; }
.meter-label { font-size:12px; color:var(--muted); margin-top:14px; }
.meter-bar { height:6px; background:var(--border); border-radius:3px; margin-top:4px; overflow:hidden; }
.meter-fill { height:100%; width:0%; background:var(--accent); border-radius:3px; transition:width 80ms; }
.log { margin-top:8px; max-height:220px; overflow-y:auto; font-size:12px; font-family:'SF Mono',Menlo,monospace;
       background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:10px; }
.log p { margin:0; padding:2px 0; color:var(--muted); border-bottom:1px solid var(--border); }
.log p:last-child { border-bottom:none; }
.log .ts { color:var(--accent); }
.note { font-size:12px; color:var(--muted); line-height:1.5; text-align:center; }
.note strong { color:var(--text); font-weight:500; }
a { color:var(--accent); text-decoration:none; }
a:hover { text-decoration:underline; }
</style>
</head>
<body>
<header>
  <img src="/static/movate-logo-light.png" alt="Mova-iO" class="brand-logo" />
  <h1>LiveKit Voice Demo</h1><span class="tag">WebRTC</span>
</header>
<main>
  <div class="card">
    <div class="status"><span id="dot" class="dot off"></span><span id="status-text">Disconnected</span></div>
    <div class="btn-row">
      <button id="btn-connect">Connect</button>
      <button id="btn-disconnect" disabled>Disconnect</button>
    </div>
    <div class="meter-label">Mic level</div>
    <div class="meter-bar"><div id="meter" class="meter-fill"></div></div>
  </div>
  <div class="card">
    <div class="log" id="log"></div>
  </div>
  <p class="note">
    <strong>LiveKit:</strong> 16 kHz Opus via WebRTC &nbsp;|&nbsp;
    <strong>Standard:</strong> 16 kHz PCM via WebSocket<br/>
    <a href="/">Back to WebSocket playground</a>
  </p>
</main>
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.js"></script>
<script>
(function(){
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('status-text');
  const btnConnect = document.getElementById('btn-connect');
  const btnDisconnect = document.getElementById('btn-disconnect');
  const meter = document.getElementById('meter');
  const logEl = document.getElementById('log');

  let room = null;
  let analyser = null;
  let animFrame = null;

  function log(msg) {
    const p = document.createElement('p');
    const ts = new Date().toLocaleTimeString();
    p.innerHTML = '<span class="ts">' + ts + '</span> ' + msg;
    logEl.appendChild(p);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setStatus(state, text) {
    dot.className = 'dot ' + state;
    statusText.textContent = text;
  }

  function startMeter(stream) {
    const ctx = new AudioContext();
    const src = ctx.createMediaStreamSource(stream);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const buf = new Uint8Array(analyser.frequencyBinCount);
    function tick() {
      analyser.getByteFrequencyData(buf);
      let sum = 0;
      for (let i = 0; i < buf.length; i++) sum += buf[i];
      const avg = sum / buf.length;
      meter.style.width = Math.min(100, avg / 128 * 100).toFixed(1) + '%';
      animFrame = requestAnimationFrame(tick);
    }
    tick();
  }

  function stopMeter() {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    meter.style.width = '0%';
  }

  async function connect() {
    try {
      btnConnect.disabled = true;
      setStatus('connecting', 'Getting token...');
      log('Requesting token from server...');

      const resp = await fetch('/livekit/token', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({room_name: 'demo-' + Date.now(), participant_name: 'browser'})
      });
      const data = await resp.json();
      if (!data.ok) { throw new Error(data.error || 'Token request failed'); }
      log('Token received for room <strong>' + data.room_name + '</strong>');

      setStatus('connecting', 'Telling agent to join...');
      const joinResp = await fetch('/livekit/join', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({room_name: data.room_name})
      });
      const joinData = await joinResp.json();
      if (!joinData.ok) { throw new Error(joinData.error || 'Join request failed'); }
      log('Agent joining as <strong>' + joinData.agent_identity + '</strong>');

      setStatus('connecting', 'Connecting to room...');
      room = new LivekitClient.Room();

      room.on(LivekitClient.RoomEvent.Connected, function() {
        setStatus('on', 'Connected');
        log('Connected to LiveKit room');
        btnDisconnect.disabled = false;
      });

      room.on(LivekitClient.RoomEvent.Disconnected, function() {
        setStatus('off', 'Disconnected');
        log('Disconnected from room');
        cleanup();
      });

      room.on(LivekitClient.RoomEvent.ParticipantConnected, function(p) {
        log('Participant joined: <strong>' + (p.identity || 'unknown') + '</strong>');
      });

      room.on(LivekitClient.RoomEvent.ParticipantDisconnected, function(p) {
        log('Participant left: <strong>' + (p.identity || 'unknown') + '</strong>');
      });

      room.on(LivekitClient.RoomEvent.TrackSubscribed, function(track, pub, participant) {
        if (track.kind === 'audio') {
          log('Receiving audio from <strong>' + (participant.identity || 'agent') + '</strong>');
          var el = track.attach();
          el.id = 'agent-audio';
          document.body.appendChild(el);
        }
      });

      room.on(LivekitClient.RoomEvent.TrackUnsubscribed, function(track) {
        track.detach().forEach(function(el) { el.remove(); });
      });

      room.on(LivekitClient.RoomEvent.DataReceived, function(payload, participant) {
        try {
          var msg = JSON.parse(new TextDecoder().decode(payload));
          if (msg.transcript) { log('Transcript: ' + msg.transcript); }
          else if (msg.answer) { log('Agent: ' + msg.answer); }
          else { log('Data: ' + JSON.stringify(msg)); }
        } catch(e) { /* ignore non-JSON data */ }
      });

      await room.connect(data.url, data.token);
      await room.localParticipant.setMicrophoneEnabled(true);
      log('Microphone published');

      var micTrack = room.localParticipant.getTrackPublication(LivekitClient.Track.Source.Microphone);
      if (micTrack && micTrack.track && micTrack.track.mediaStream) {
        startMeter(micTrack.track.mediaStream);
      }
    } catch(err) {
      setStatus('error', 'Error');
      log('Error: ' + err.message);
      cleanup();
    }
  }

  function cleanup() {
    btnConnect.disabled = false;
    btnDisconnect.disabled = true;
    stopMeter();
    var el = document.getElementById('agent-audio');
    if (el) el.remove();
  }

  async function disconnect() {
    if (room) {
      log('Disconnecting...');
      await room.disconnect();
      room = null;
    }
    cleanup();
    setStatus('off', 'Disconnected');
  }

  btnConnect.addEventListener('click', connect);
  btnDisconnect.addEventListener('click', disconnect);
  log('Ready. Click <strong>Connect</strong> to start.');
})();
</script>
</body>
</html>
