[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "movate-cli"
version = "0.2.0"
description = "movate — declarative platform for building, evaluating, and deploying AI agents"
authors = [{ name = "Movate", email = "engineering@movate.com" }]
license = { text = "Proprietary" }
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6,<3",
    "pyyaml>=6.0",
    "jinja2>=3.1",
    "typer>=0.12",
    "rich>=13.7",
    "httpx>=0.27",
    "litellm>=1.50,<2",
    "python-dotenv>=1.0",
    "aiosqlite>=0.20",
    "structlog>=24.1",
    "jsonschema>=4.21",
]

[project.optional-dependencies]
runtime = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "asyncpg>=0.29",
    "bcrypt>=4.0",
]
langfuse = ["langfuse>=2.30,<3"]
otel = [
    "opentelemetry-api>=1.25",
    "opentelemetry-sdk>=1.25",
    "opentelemetry-exporter-otlp>=1.25",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "ruff>=0.4",
    "mypy>=1.10",
    "types-PyYAML",
    "types-jsonschema",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "ruff>=0.4",
    "mypy>=1.10",
    "types-PyYAML",
    "types-jsonschema",
]

[project.scripts]
movate = "movate.cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/movate"]

[tool.hatch.build.targets.wheel.force-include]
"src/movate/templates" = "movate/templates"
"src/movate/providers/pricing.yaml" = "movate/providers/pricing.yaml"

[tool.uv]
package = true

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "RUF", "PL", "SIM"]
ignore = ["PLR0913", "PLR0915"]

[tool.ruff.lint.per-file-ignores]
# Typer's idiomatic pattern uses function-call defaults (`typer.Option(...)`); B008 misfires there.
"src/movate/cli/*.py" = ["B008"]
# Tests freely use literals in assertions, broad-catch raises, and slf-private access.
"tests/*.py" = ["PLR2004", "PLR0915", "B017", "SLF001"]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src/movate"]

[[tool.mypy.overrides]]
module = ["jsonschema.*", "aiosqlite.*", "litellm.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "unit: fast unit tests",
    "integration: integration tests using local mode",
    "smoke: live API smoke tests (opt-in, env-gated)",
]
addopts = "-ra --strict-markers"
