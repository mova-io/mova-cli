# Auto-provisioned Grafana datasource: the demo Prometheus.
# Lives at this path because docker-compose.yml mounts
#   ./grafana/provisioning -> /etc/grafana/provisioning  (Grafana's well-known
# config root for file-based provisioning).
#
# The uid "prometheus" matches the DS_PROMETHEUS placeholder the in-repo
# dashboards-as-code under dashboards/grafana/*.json reference, so the
# auto-provisioned dashboards bind to this datasource on first load with no
# manual "pick a data source" step.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: prometheus
    editable: false
    jsonData:
      httpMethod: POST
      prometheusType: Prometheus
      prometheusVersion: 2.53.0
