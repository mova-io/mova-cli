# roadmap.yaml — the single durable source of truth for the mdk roadmap.
#
# Per ADR 058 (docs/adr/058-roadmap-calver-sync.md):
#   * This file holds EVERY roadmap item: planned, in_progress, shipped, dropped.
#   * `planned`/`in_progress` items are HAND-AUTHORED — intent lives with humans.
#   * The `pr` / `shipped_version` / `status: shipped` fields are the truth
#     projected from CalVer at merge. In step 1 (this file's first revision)
#     they are back-filled from git history; in step 2 the auto-stamp Action
#     fills them on every merge so humans never hand-write "done @ version".
#
# CalVer is the join key (ADR 058 D2): every merge bumps YYYY.M.D.N exactly
# once, so `shipped_version` is a dense per-PR identifier. The append-only
# ledger lives in shipped.jsonl.
#
# ROADMAP.md is GENERATED from this file + shipped.jsonl by
# scripts/gen_roadmap.py and freshness-gated in CI — never hand-edit it.
# After editing this file, run:  python3 scripts/gen_roadmap.py
#
# Item schema:
#   id:              stable kebab-case identifier (never reused/renamed)
#   title:           human-readable one-liner
#   status:          planned | in_progress | shipped | dropped
#   pr:              (shipped) the PR number that delivered it
#   shipped_version: (shipped) the CalVer at merge
#   adr:             (optional) the ADR number that governs it
#   depends_on:      (optional) list of ids this item builds on

