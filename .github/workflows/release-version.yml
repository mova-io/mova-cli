name: release-version

# ADR 059 — assign the CalVer version once, at merge, on `main`.
#
# PRs no longer bump the version (that caused version-file conflicts + forced
# re-bumps). Instead, every push to `main` that changes anything OTHER than the
# version files triggers this job, which bumps CalVer and commits it back with
# `[skip ci]`. `paths-ignore` on the version files + the `[skip ci]` tag + the
# head-commit guard together guarantee this never self-triggers / loops.

on:
  push:
    branches: [main]
    paths-ignore:
      - pyproject.toml
      - src/movate/__init__.py
      - uv.lock

permissions:
  contents: write

# Serialize bumps so two near-simultaneous merges can't race the push.
concurrency:
  group: release-version
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    # Belt-and-braces: never act on our own release commit.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          # RELEASE_TOKEN (a repo-admin PAT, Contents:write) so the bump push is
          # attributed to an admin and clears the branch ruleset (ADR 059); falls
          # back to GITHUB_TOKEN if unset (push will be rejected until the secret
          # is added — see CLAUDE.md / the PR body).
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Assign CalVer + commit to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Recompute from the latest main in case a sibling bump landed first.
          git pull --rebase --autostash origin main
          python3 scripts/bump_version.py
          if git diff --quiet -- pyproject.toml src/movate/__init__.py uv.lock; then
            echo "version already current — nothing to assign"
            exit 0
          fi
          VERSION="$(python3 scripts/bump_version.py --print)"
          git add pyproject.toml src/movate/__init__.py uv.lock
          git commit -m "chore(release): ${VERSION} [skip ci]"
          # Retry-push in case another merge raced us (concurrency serializes,
          # but be defensive against a fast-follow push).
          for _ in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase --autostash origin main
            python3 scripts/bump_version.py
            git add pyproject.toml src/movate/__init__.py uv.lock
            git commit --amend -m "chore(release): $(python3 scripts/bump_version.py --print) [skip ci]"
          done
          echo "failed to push release bump after retries" >&2
          exit 1
