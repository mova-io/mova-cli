name: daily-changelog

# Daily "What's New" digest.
#
# Every morning this collects the PREVIOUS day's merged PRs and posts a dated
# digest as a COMMENT on a single pinned "What's New" tracking Issue. Durable:
# runs on GitHub's infra, independent of any local/agent session.
#
# ─────────────────────────────────────────────────────────────────────────────
# WHY a tracking Issue (and not a README-on-main PR)
# ─────────────────────────────────────────────────────────────────────────────
# The original design prepended the digest to README.md via an auto-merged PR.
# In this org that path is a dead end with no zero-credential way out:
#   * the org forbids fine-grained PATs (they can't be approved), so the old
#     `MOVATE_BOT_TOKEN` approach can't be provisioned;
#   * "Allow GitHub Actions to create and approve pull requests" is OFF
#     (can_approve_pull_request_reviews: false), so the built-in GITHUB_TOKEN
#     can't open a PR at all; and
#   * `main` requires status checks, so GITHUB_TOKEN can't push to it either.
# Landing README on main would therefore require a GitHub App — extra infra and
# credentials we don't want.
#
# Instead we post each day's digest as a comment on a pinned tracking Issue.
# Writing Issues needs only the built-in GITHUB_TOKEN with `issues: write`
# (this repo has issues enabled) — NO PAT, NO App, NO PR, NO protected-branch
# write, NO version bump. This is the org-compliant, zero-credential path.
#
# NOTE: the `MOVATE_BOT_TOKEN` secret is no longer used by this workflow and may
# be deleted. See docs/daily-changelog.md for the runbook + how to test via
# dispatch.

on:
  schedule:
    # 14:00 UTC daily ≈ 06:00 US Pacific (PDT, UTC-7) / 07:00 (during PST,
    # UTC-8) — a "what shipped yesterday" digest waiting when the US team
    # starts the morning. GitHub cron is always UTC and has no DST.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Digest date YYYY-MM-DD (UTC). Default: yesterday."
        required: false
        type: string

# Least privilege: read the repo to run the generator, and write Issues to post
# the digest comment. No pull-requests / contents:write — we never open a PR or
# push to a branch anymore.
permissions:
  contents: read
  issues: write

concurrency:
  # One digest run at a time; a manual dispatch supersedes a queued scheduled
  # run rather than racing it on the same tracking issue.
  group: daily-changelog
  cancel-in-progress: false

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute date window (UTC)
        id: window
        # Resolve the digest date (dispatch input override, else yesterday) and
        # the day window the gh search uses (merged:start..next). NOTE: a `>=`
        # prefix on a `..` range is malformed GitHub-search syntax and silently
        # matches NOTHING — use the bare range `merged:DATE..NEXT`, which at day
        # granularity resolves to exactly DATE's calendar day (UTC).
        # The dispatch input is passed via env (not interpolated into the shell)
        # to avoid actionlint's expression-injection warning.
        env:
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            DATE="$INPUT_DATE"
          else
            DATE="$(date -u -d 'yesterday' +%Y-%m-%d)"
          fi
          NEXT="$(date -u -d "$DATE + 1 day" +%Y-%m-%d)"
          {
            echo "date=$DATE"
            echo "next=$NEXT"
          } >> "$GITHUB_OUTPUT"
          echo "Digest window: merged:$DATE..$NEXT"

      - name: Collect merged PRs
        env:
          # Read-only listing; the built-in token can read PRs fine.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DATE: ${{ steps.window.outputs.date }}
          NEXT: ${{ steps.window.outputs.next }}
        run: |
          gh pr list \
            --repo "$REPO" \
            --state merged \
            --search "merged:${DATE}..${NEXT}" \
            --json number,title,author,mergedAt \
            > prs.json
          echo "Fetched $(jq 'length' prs.json) merged PR(s) for ${DATE}."

      - name: Generate digest
        id: gen
        env:
          REPO: ${{ github.repository }}
          DATE: ${{ steps.window.outputs.date }}
        # Pipe the PR JSON into the pure generator (no network in the script) in
        # issue mode: the digest Markdown (with its hidden per-date marker) is
        # written to digest.md. Record whether anything actually merged so the
        # post step can skip a quiet day cleanly.
        run: |
          python scripts/gen_daily_changelog.py \
            --format issue \
            --repo "$REPO" \
            --date "${DATE}" \
            < prs.json \
            > digest.md
          if [ "$(jq 'length>0' prs.json)" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No PRs merged for ${DATE} — skipping the tracking-issue comment."
          fi

      - name: Post digest to tracking issue
        if: steps.gen.outputs.changed == 'true'
        env:
          # Built-in token with issues:write — the whole point of this design:
          # no PAT, no App, just GITHUB_TOKEN posting an Issue comment.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DATE: ${{ steps.window.outputs.date }}
        # Find (or bootstrap + pin) the single "What's New" tracking issue, then
        # post the day's digest as a comment — unless a comment for this date
        # already exists (idempotent re-dispatch via the per-date marker).
        run: |
          set -euo pipefail

          MARKER="<!-- whats-new-tracker -->"
          DATE_MARKER="<!-- changelog:${DATE} -->"

          # 1. Find the open tracking issue by its hidden marker in the body.
          ISSUE="$(gh issue list \
            --repo "$REPO" \
            --state open \
            --search "\"${MARKER}\" in:body" \
            --json number,body \
            --jq "[.[] | select(.body | contains(\"${MARKER}\"))][0].number // empty")"

          # 2. None found → create it (with the marker), then best-effort pin it.
          if [ -z "$ISSUE" ]; then
            ISSUE="$(gh issue create \
              --repo "$REPO" \
              --title "📋 What's New — daily digest" \
              --body "${MARKER}"$'\n\n'"Daily \"What's New\" digests are posted as comments below — one per day, newest at the bottom. Auto-maintained by the [\`daily-changelog\`](.github/workflows/daily-changelog.yml) workflow." \
              | grep -oE '[0-9]+$')"
            echo "Created tracking issue #${ISSUE}."
            # Pinning is nice-to-have, not required; never fail the run on it.
            gh issue pin "$ISSUE" --repo "$REPO" || echo "::warning::Could not pin issue #${ISSUE} (pinning not permitted) — continuing."
          else
            echo "Using existing tracking issue #${ISSUE}."
          fi

          # 3. Idempotency: skip if a comment for this date already exists.
          if gh api "repos/${REPO}/issues/${ISSUE}/comments" --paginate --jq '.[].body' \
            | grep -qF "${DATE_MARKER}"; then
            echo "already posted for ${DATE} — skipping."
            exit 0
          fi

          # 4. Post the digest (its first line is the per-date marker).
          gh issue comment "$ISSUE" --repo "$REPO" --body-file digest.md
          echo "Posted digest for ${DATE} to tracking issue #${ISSUE}."
