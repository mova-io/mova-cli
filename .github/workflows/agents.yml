# Per-agent pre-flight gate. Distinct from ``ci.yml`` (lint + unit tests)
# because operators want a SEPARATE PR check that says "every agent in
# this repo validates + scores against its committed baseline."
#
# Originally this workflow used a per-agent matrix with shell-glue. The
# matrix moved into the ``movate ci eval`` command so the YAML stays a
# one-liner — the command iterates over every agent in agents_dir, runs
# each through the eval engine, gates against committed baselines, and
# appends a markdown summary to $GITHUB_STEP_SUMMARY for PR visibility.
#
# Mock-mode keeps the gate hermetic — no API keys, $0 cost, deterministic
# scoring. For real-LLM eval (which IS what you want for an actual
# customer-facing agent), look at ``docs/ci/eval-gate.example.yml``
# and wire your provider keys via repo secrets.

name: agents

on:
  # ADR 059 D4 — run inside the GitHub merge queue (merge_group has no path
  # filter, so this hermetic mock-mode gate runs on every merge group; cheap).
  merge_group:
    types: [checks_requested]
  pull_request:
    paths:
      - "agents/**"
      - ".movate/**"
      - "project.yaml"
      - "movate.yaml"   # legacy name; still loads through v1.x
      - "src/movate/**"   # changes to the framework can break agent loading
      - ".github/workflows/agents.yml"
  push:
    branches: [main]
    paths:
      - "agents/**"
      - ".movate/**"

jobs:
  validate-and-eval:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync deps
        # --all-extras pulls in litellm/openai/anthropic/langchain so
        # every runtime is wired for the validate step's
        # runtime-availability probe. --no-extra airflow: airflow and
        # playground are declared conflicting (sqlalchemy<2 vs >=2), so
        # `--all-extras` alone errors; airflow isn't needed for validation.
        run: uv sync --all-extras --no-extra airflow --dev

      - name: Validate every agent
        # `find` rather than hardcoding agent names so adding a new
        # agent under agents/<name>/ is automatic.
        run: |
          set -e
          for agent in agents/*/; do
            if [ -f "$agent/agent.yaml" ]; then
              echo "::group::validate $agent"
              uv run movate validate "$agent" --strict
              echo "::endgroup::"
            fi
          done

      - name: Eval every agent (gated against committed baselines)
        # `movate ci eval` discovers all agents, runs each through the
        # eval engine, gates on per-agent baselines at
        # .movate/<agent>/baseline.json. The same command works locally
        # for pre-flight: `movate ci eval --mock` before pushing.
        run: |
          uv run movate ci eval \
            --mock \
            --regression-tolerance 0.0 \
            --summary-file "$GITHUB_STEP_SUMMARY"
