name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  # ADR 059 D4 — run the required checks inside the GitHub merge queue. The
  # queue tests each PR against the latest `main` on a temporary
  # `gh-readonly-queue/*` ref via the `merge_group` event; without this trigger
  # the required checks never run in the queue and PRs hang forever.
  merge_group:
    types: [checks_requested]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.11

      # NOTE (ADR 059): the per-PR "Version bump gate" was REMOVED. PRs no
      # longer carry a version bump — the CalVer version is assigned once, at
      # merge, by `.github/workflows/release-version.yml` (push-to-main). This
      # eliminated the version-file conflicts + forced re-bumps that the
      # branch-local version caused. The pyproject↔uv.lock consistency check
      # below stays (it catches a real dep-drift bug, orthogonal to versioning).

      # Catches pyproject.toml ↔ uv.lock drift. If you bump a dep in
      # pyproject.toml without re-running `uv lock`, the Docker build's
      # `uv sync --frozen` installs the OLD lockfile contents — which
      # bit us on 2026-05-13 (python-multipart added to runtime extra
      # but not in uv.lock → ACA container crash-looped on startup).
      # Cheap CI step that prevents a class of "works locally, breaks
      # the deploy" failures.
      - name: Lockfile freshness
        run: uv lock --check

      - name: Sync deps
        # --no-extra airflow: the `airflow` and `playground` extras are
        # declared conflicting (apache-airflow pins sqlalchemy<2 while
        # Chainlit's data layer needs sqlalchemy>=2), so `--all-extras`
        # alone errors. Drop airflow here — its integration tests fake the
        # `airflow` module rather than importing the real package, so the
        # suite runs green without it. The playground extra (and its
        # sqlalchemy 2.x) is what we actually need installed for CI.
        run: uv sync --all-extras --no-extra airflow --dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Type-check
        run: uv run mypy src

      - name: Tests
        run: uv run pytest -m "not smoke"

      # License gate — fails the build if any installed dep declares
      # a license outside the allowlist in docs/license-posture.md.
      # Catches copyleft / SSPL / BSL / restrictive-source-available
      # deps at PR time, before they propagate into customer engagements
      # built on movate-cli. See scripts/check_licenses.py for the
      # allowlist + the process to add a new license entry.
      - name: License gate
        run: uv run python scripts/check_licenses.py --strict

  # Postgres conformance — runs the same parametrized storage suite
  # against a real Postgres 16, exercising what the default ``lint-and-test``
  # job skips. Without this, a regression in storage/postgres.py would
  # only be caught when a developer happens to set MOVATE_PG_TEST_URL
  # locally. ~30s overhead vs the savings on regression triage time.
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector/pgvector image (Postgres 16 + the `vector` extension
        # preinstalled) so PostgresProvider.init() can `CREATE EXTENSION
        # vector` for the KB vector store. Drop-in for the stock postgres:16
        # image (same entrypoint / env / health-check). See ADR 009.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: movate
          POSTGRES_PASSWORD: movate
          POSTGRES_DB: movate_test
        ports:
          - 5432:5432
        # GHA needs an explicit health-check or the job races startup.
        options: >-
          --health-cmd "pg_isready -U movate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync deps
        # --no-extra airflow: airflow/playground are declared conflicting
        # (sqlalchemy<2 vs >=2); airflow's tests fake the module, so the
        # suite runs without the real package. See the main test job above.
        run: uv sync --all-extras --no-extra airflow --dev

      - name: Run storage conformance suite + PG-specific tests
        env:
          MOVATE_PG_TEST_URL: postgresql://movate:movate@127.0.0.1:5432/movate_test
        # Only the storage suites need PG; rest of the suite ran in
        # the lint-and-test job already.
        run: uv run pytest tests/test_jobs_storage.py tests/test_auth.py tests/test_sqlite.py tests/test_pgvector_extension.py tests/test_pgvector_search.py tests/test_graph_storage.py -v

  # Lint every .yml under .github/workflows/ — including the example
  # workflow we ship for downstream consumers (eval-gate.example.yml).
  # Catches breakage from GitHub Actions deprecations / typos before
  # consumers do.
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

  # Bicep validation — compiles infra/azure/main.bicep on every PR so
  # syntax errors / unknown resource types / param mismatches get caught
  # before an operator tries to az deployment group create. No Azure
  # subscription needed; `bicep build` is fully local.
  bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep
          bicep --version

      - name: Bicep build (main + all modules transitively)
        # `bicep build` compiles the entry point and every module it
        # references; one invocation covers the whole tree. Errors
        # fail the job; warnings (no-unnecessary-dependson, etc.) are
        # informational.
        run: bicep build infra/azure/main.bicep --outdir /tmp/bicep-out

      - name: Bicep lint
        # `bicep lint` runs the linter ruleset (no-unused-params,
        # secure-secrets-in-params, etc.) and fails on errors.
        run: bicep lint infra/azure/main.bicep

  # NOTE: the previous ``auto-version-bump`` job (every push-to-main
  # opened a chore: bump PR via the github-actions[bot] and
  # auto-merged it) was removed because the mova-io org policy
  # disables "Allow GitHub Actions to create and approve pull
  # requests" — the bot could push the branch but ``gh pr create``
  # always 409'd, leaving dangling ``bot/bump-v*`` branches on every
  # merge with no PR ever opened. Rather than fight the policy, we
  # moved to a release-tag bump model: the version is bumped manually
  # when cutting a release (see ``RELEASING.md`` step 6 + the
  # ``scripts/bump_version.py`` script). Operators install from a
  # specific tag / GitHub Release asset, so ``mdk --version`` matches
  # the tag they pulled. Removed: 2026-05.
