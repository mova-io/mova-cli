name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.11

      # Catches pyproject.toml ↔ uv.lock drift. If you bump a dep in
      # pyproject.toml without re-running `uv lock`, the Docker build's
      # `uv sync --frozen` installs the OLD lockfile contents — which
      # bit us on 2026-05-13 (python-multipart added to runtime extra
      # but not in uv.lock → ACA container crash-looped on startup).
      # Cheap CI step that prevents a class of "works locally, breaks
      # the deploy" failures.
      - name: Lockfile freshness
        run: uv lock --check

      - name: Sync deps
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Type-check
        run: uv run mypy src

      - name: Tests
        run: uv run pytest -m "not smoke"

      # License gate — fails the build if any installed dep declares
      # a license outside the allowlist in docs/license-posture.md.
      # Catches copyleft / SSPL / BSL / restrictive-source-available
      # deps at PR time, before they propagate into customer engagements
      # built on movate-cli. See scripts/check_licenses.py for the
      # allowlist + the process to add a new license entry.
      - name: License gate
        run: uv run python scripts/check_licenses.py --strict

  # Postgres conformance — runs the same parametrized storage suite
  # against a real Postgres 16, exercising what the default ``lint-and-test``
  # job skips. Without this, a regression in storage/postgres.py would
  # only be caught when a developer happens to set MOVATE_PG_TEST_URL
  # locally. ~30s overhead vs the savings on regression triage time.
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: movate
          POSTGRES_PASSWORD: movate
          POSTGRES_DB: movate_test
        ports:
          - 5432:5432
        # GHA needs an explicit health-check or the job races startup.
        options: >-
          --health-cmd "pg_isready -U movate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync deps
        run: uv sync --all-extras --dev

      - name: Run storage conformance suite + PG-specific tests
        env:
          MOVATE_PG_TEST_URL: postgresql://movate:movate@127.0.0.1:5432/movate_test
        # Only the storage suites need PG; rest of the suite ran in
        # the lint-and-test job already.
        run: uv run pytest tests/test_jobs_storage.py tests/test_auth.py tests/test_sqlite.py -v

  # Lint every .yml under .github/workflows/ — including the example
  # workflow we ship for downstream consumers (eval-gate.example.yml).
  # Catches breakage from GitHub Actions deprecations / typos before
  # consumers do.
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

  # Bicep validation — compiles infra/azure/main.bicep on every PR so
  # syntax errors / unknown resource types / param mismatches get caught
  # before an operator tries to az deployment group create. No Azure
  # subscription needed; `bicep build` is fully local.
  bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep
          bicep --version

      - name: Bicep build (main + all modules transitively)
        # `bicep build` compiles the entry point and every module it
        # references; one invocation covers the whole tree. Errors
        # fail the job; warnings (no-unnecessary-dependson, etc.) are
        # informational.
        run: bicep build infra/azure/main.bicep --outdir /tmp/bicep-out

      - name: Bicep lint
        # `bicep lint` runs the linter ruleset (no-unused-params,
        # secure-secrets-in-params, etc.) and fails on errors.
        run: bicep lint infra/azure/main.bicep

  # Auto-bump the patch component of the version on every push to main.
  # Lets operators tell at a glance whether `mdk --version` reflects
  # the latest merged code — a stale install shows an older patch
  # number than the README/GitHub release tag.
  #
  # Why the PR dance instead of a direct push: main is a protected
  # branch with "Require PR before merging" enabled, so even the
  # github-actions[bot] (with contents:write) can't push directly.
  # The bot opens a tiny bump-only PR and enables auto-merge; the
  # `[skip ci]` in the PR title becomes the squash-merge commit
  # message, which our own `if:` condition uses to break the
  # otherwise-infinite loop (push to main → fires this workflow →
  # opens bump PR → merges → push to main → ...).
  auto-version-bump:
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Bump patch version
        id: bump
        run: |
          new_version=$(python scripts/bump_version.py)
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Refresh uv.lock with new package version
        # The bump touches pyproject.toml's [project].version; without
        # also regenerating uv.lock the next CI run fails the lockfile
        # freshness gate (`uv lock --check`) and silently skips the
        # next auto-bump (and any other lint-and-test-dependent job).
        # `uv lock` recomputes the lockfile in place — for a version-
        # only bump this is fast because no dependency graph changes.
        run: uv lock

      - name: Open + auto-merge bump PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          new_version='${{ steps.bump.outputs.new_version }}'
          # Suffix the branch with the GHA run ID so each attempt gets
          # its own branch. Without this, a previous failed run (one
          # that pushed the branch but failed before opening the PR)
          # leaves bot/bump-vN.N.N on remote, and every subsequent
          # push fails with "non-fast-forward". Run IDs are guaranteed
          # unique per workflow execution.
          branch="bot/bump-v${new_version}-${{ github.run_id }}"
          parent_sha=$(git rev-parse --short HEAD)
          parent_subject=$(git log -1 --pretty=%s HEAD)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add pyproject.toml src/movate/__init__.py uv.lock
          git commit -m "chore: bump version to ${new_version} [skip ci]"
          git push origin "$branch"

          # IMPORTANT: don't write the literal "[ skip ci ]" string
          # (without the spaces) in the body — GitHub Actions scans the
          # ENTIRE commit message (title + body) of the squash-merge
          # commit for that marker. Repeating it in explanatory text
          # would cause the merge commit to silently skip CI, which
          # would also skip this workflow on the next push to main and
          # break the auto-bump chain. The title carries the marker;
          # the body must not.
          pr_url=$(gh pr create \
            --base main --head "$branch" \
            --title "chore: bump version to ${new_version} [skip ci]" \
            --body "Automated patch bump after \`${parent_sha} ${parent_subject}\`.

          The CI-skip marker is intentionally only in the title — see
          the workflow comments in \`.github/workflows/ci.yml\` for why
          the body must not repeat it.")
          echo "Opened: $pr_url"

          # Try auto-merge first (queues until any required checks pass).
          # If branch protection prevents auto-merge from being enabled,
          # fall back to an immediate squash-merge (which works because
          # the bot's own PR has no required reviews).
          gh pr merge --squash --auto "$pr_url" \
            || gh pr merge --squash "$pr_url"
