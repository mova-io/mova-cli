# E2E smoke against a staging deploy (Sprint S).
#
# Runs nightly + on-demand. Hits a real `mdk serve` instance via a
# deployed URL, smokes a tiny set of canonical operations, and red-bars
# if any of them fail. Distinct from the unit-test ci.yml which never
# touches an external service.
#
# What we test:
#   1. /healthz returns 200
#   2. `mdk submit` against the deployed URL accepts a job
#   3. `mdk jobs get <id>` resolves the job to a completed/queued state
#   4. `mdk costs report` against the deployed DB returns parseable JSON
#
# What we DON'T test:
#   * Eval pass-rate — that's eval-gate.yml's job. Smoke is "does the
#     deploy answer the phone?" not "does it answer correctly?"
#   * Cost regressions — Sprint S+ when `mdk costs report --baseline`
#     lands.
#
# Required GitHub secrets (configure under Settings → Secrets):
#   MOVATE_STAGING_URL    — e.g. https://movate-staging.example.com
#   MOVATE_STAGING_TOKEN  — an `mvt_staging_*` API key with read scope

name: e2e-smoke

on:
  # Nightly @ 03:00 UTC — well after typical deploy windows so we
  # smoke the post-deploy state, not the in-flight state.
  schedule:
    - cron: "0 3 * * *"
  # Manual trigger from the Actions tab — operators kick this after
  # a fresh deploy to verify before walking away from their desk.
  workflow_dispatch:

jobs:
  smoke:
    name: smoke against staging
    runs-on: ubuntu-latest
    # 10-minute budget — anything longer means staging itself is the
    # problem; surfacing as a workflow timeout is the cleanest signal.
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install mdk
        run: uv sync --frozen

      # ---- Step 1: liveness -------------------------------------------------
      - name: Hit /healthz
        env:
          STAGING_URL: ${{ secrets.MOVATE_STAGING_URL }}
        run: |
          if [ -z "${STAGING_URL}" ]; then
            echo "::error::MOVATE_STAGING_URL secret not configured"
            exit 1
          fi
          # -fS makes curl exit non-zero on 4xx/5xx + silent on success.
          curl -fSs "${STAGING_URL}/healthz" -o /dev/null
          echo "::notice::staging /healthz OK"

      # ---- Step 2: job submission -------------------------------------------
      - name: Submit + poll a smoke job
        env:
          MDK_TARGET: ${{ secrets.MOVATE_STAGING_URL }}
          MDK_API_KEY: ${{ secrets.MOVATE_STAGING_TOKEN }}
        run: |
          set -e
          # Submit a deterministic input — we don't assert on output
          # correctness here (eval-gate.yml does that). We just need
          # the runtime to ACCEPT + dispatch.
          JOB_OUT=$(uv run mdk submit faq-agent '{"q": "smoke-test"}' --json)
          echo "::debug::${JOB_OUT}"
          # Extract the job_id with jq.
          JOB_ID=$(echo "$JOB_OUT" | jq -r '.job_id')
          if [ -z "$JOB_ID" ] || [ "$JOB_ID" = "null" ]; then
            echo "::error::submit did not return a job_id"
            exit 1
          fi
          # Poll until the job leaves QUEUED. 60s of retry budget;
          # if the worker is healthy this resolves in <5s.
          for i in $(seq 1 30); do
            STATUS=$(uv run mdk jobs get "$JOB_ID" --json | jq -r '.status')
            if [ "$STATUS" = "success" ] || [ "$STATUS" = "error" ]; then
              echo "::notice::job $JOB_ID finished with status=$STATUS"
              exit 0
            fi
            sleep 2
          done
          echo "::error::job $JOB_ID stuck at $STATUS after 60s"
          exit 1

      # ---- Step 3: cost report sanity ---------------------------------------
      - name: Costs report parseable
        env:
          MDK_TARGET: ${{ secrets.MOVATE_STAGING_URL }}
          MDK_API_KEY: ${{ secrets.MOVATE_STAGING_TOKEN }}
        run: |
          # We don't assert on numbers — just that the command exits 0
          # and returns valid JSON. Catches storage-disconnect or
          # schema-drift regressions even when /healthz is happy.
          uv run mdk costs report --json | jq -e '.rollups | type == "array"' > /dev/null
          echo "::notice::costs report shape OK"

  # Aggregate job — lets branch protection rules require "e2e-smoke"
  # as a single status check rather than each step individually.
  e2e-smoke:
    name: e2e-smoke
    needs: smoke
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Aggregate result
        run: |
          if [ "${{ needs.smoke.result }}" != "success" ]; then
            echo "::error::staging smoke failed — see the 'smoke' job above"
            exit 1
          fi
          echo "::notice::all staging smokes green"
