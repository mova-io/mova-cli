agents_dir: ./agents
workflows_dir: ./workflows

bench:
  models:
    - openai/gpt-4o-mini-2024-07-18
    - openai/gpt-4o-2024-08-06
    - anthropic/claude-haiku-4-5-20251001
    - anthropic/claude-sonnet-4-6
  judges:
    - openai/gpt-4o-2024-08-06
    - anthropic/claude-sonnet-4-6
  runs: 5

eval:
  gate: 0.7

# Org-wide model policy (v1.0 stage 3). Enforced at `movate validate`
# (static check on every agent.yaml) and at `Executor.execute()` entry
# (runtime check, so bundles loaded via `movate serve` can't bypass).
#
# Empty / absent policy = permissive default (no restrictions). Uncomment
# fields below to opt in.
#
# policy:
#   allowed_providers: [openai, azure, anthropic]
#   deny_models:
#     - openai/gpt-3.5-turbo
#   max_cost_per_run_usd: 0.50

# 'A by default': every agent goes through LiteLLM. Native-SDK escape
# hatches (runtime: native_anthropic / native_openai / langchain) are
# REJECTED at validate time. This is the project's strategic stance —
# LiteLLM's portability beats per-provider feature parity for the
# common case. Lift this restriction explicitly (add a runtime to the
# allowed list) when a specific agent has a justified need for native
# features (MCP, strict structured outputs, an existing LangChain chain).
runtime:
  # `lyzr` is allow-listed because v0.7 adds the Lyzr migration bridge
  # (mdk import lyzr + runtime: lyzr adapter). Once a customer agent
  # is migrated to MDK-native, its agent.yaml will declare runtime:
  # litellm and won't trip this gate.
  allowed: [litellm, lyzr]
