# Governance policy shipped with the deployed runtime/worker image (ADR 093 /
# ADR 096 — the expense-approval certification scenario's governance gates).
#
# HOW IT IS LOADED. `load_project_config()` (movate/core/config.py) reads the
# project base file from the process CWD — the container's WORKDIR is
# /opt/movate, so the Dockerfile bakes this file there (as `project.yaml`,
# the loader's canonical base-file name). Both the API (`movate serve`) and
# the workers (`movate worker`, `movate worker --backend temporal` via
# `configure_activities`, #822) resolve their ModelPolicy from it.
#
# WHAT IT DOES. With this block present the Executor's ADR 093 governance
# shadow is built (model + cost + runtime + skill gates) and every run records
# a governance decision — which the execution edges project onto
# `observability_facts.governance_effect` (deny > warn > allow; NULL when no
# gate evaluated). That is the column the certification suite's `governance`
# capability asserts.
#
# SCOPE. The policy applies to the WHOLE baked catalog (agents/ + workflows/),
# not just expense-approval — `load_project_config()` is process-wide. Both
# constraints below are deliberately satisfied by every bundled agent, so the
# gates evaluate (effect = `allow`) without ever blocking a demo run:
#
# * `allowed_providers` covers the catalog's primary models (openai/...) AND
#   fallbacks (anthropic/...). A provider outside the list is an enforced
#   PolicyViolationError at Executor entry — extend the list before baking an
#   agent on a new provider.
# * `max_cost_per_run_usd` sits well above the default agent budget
#   (`budget.max_cost_usd_per_run` = 1.0), so the COST gate evaluates every
#   run but never warns or denies. Lower it below an agent's declared budget
#   only if you WANT that agent blocked (the legacy check raises; the
#   governance shadow records the deny→warn downgrade under the default
#   warn-mode rollout).
policy:
  allowed_providers: [openai, anthropic]
  max_cost_per_run_usd: 5.00
