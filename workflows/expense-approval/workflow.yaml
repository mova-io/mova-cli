api_version: movate/v1
kind: Workflow
name: expense-approval
version: 0.1.0
description: >
  Tiered expense approval, durable on Temporal — ZERO LLM classifiers on the
  approval path. The amount tier routes on a deterministic `decision` node
  (ADR 094); each tier pauses durably at a HUMAN approval gate that routes
  directly on the approver's structured `decision` (ADR 099 — gap #48 closed:
  approve→post-erp, reject→rejected, any other wording fails safe to
  rejected). All tiers CONVERGE on one shared `post-erp`/`finalize`/`rejected`
  tail (exclusive convergence, ADR 098). Self-contained (bundled into the
  temporal-worker image): real LLM agents over simulated expense data, real
  durable execution + tracing (Temporal UI + Langfuse + Grafana). Mirrors
  certification/scenarios/expense-approval.
runtime: temporal
state_schema: ./state.json
entrypoint: classify
nodes:
  # Deterministic value routing on the expense amount (ADR 094) — replaces the
  # LLM tier-classifier the certification suite flagged as gap #47.
  - id: classify
    type: decision
    cases:
      - when: {field: amount, op: gt, value: 5000}
        to: director-approval
      - when: {field: amount, op: gt, value: 100}
        to: manager-approval
    default: post-erp
  # --- manager tier (>$100). The gate routes its OWN decision (ADR 099) —
  # --- trim+casefold exact match, no LLM; prose answers fail safe to rejected.
  - id: manager-approval
    type: human
    prompt: >
      Approve this expense (manager)? Respond with `decision` set to exactly
      "approve" or "reject" — any other wording is treated as reject.
    output_contract: [decision]
    routes: {approve: post-erp, reject: rejected}
    fallback: rejected
  # --- director tier (>$5000) ---
  - id: director-approval
    type: human
    prompt: >
      Approve this expense (director, >$5000)? Respond with `decision` set to
      exactly "approve" or "reject" — any other wording is treated as reject.
    output_contract: [decision]
    routes: {approve: post-erp, reject: rejected}
    fallback: rejected
  # --- shared tail (ADR 098): every tier's approve path posts + finalizes via
  # --- ONE node each, every reject path lands on ONE rejected node.
  - {id: post-erp, type: agent, ref: ./agents/erp-poster}
  - {id: finalize, type: agent, ref: ./agents/finalize}
  - {id: rejected, type: agent, ref: ./agents/rejected}
edges:
  - {from: post-erp, to: finalize}
tags:
  - temporal
  - decision
  - hitl
  - certification
