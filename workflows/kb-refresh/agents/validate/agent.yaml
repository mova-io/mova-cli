api_version: movate/v1
kind: Agent
name: validate
version: 0.1.0
description: >-
  Checks the deterministic ingest summary against fixed quality rules and
  emits {ok, note} — the boolean the workflow's decision node routes on.
model:
  provider: openai/gpt-4o-mini
  params: {temperature: 0.0}
prompt: ./prompt.md
schema: {input: ./schema/input.json, output: ./schema/output.json}
evals: {dataset: ./evals/dataset.jsonl}
