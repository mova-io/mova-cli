api_version: movate/v1
kind: Skill

name: sim-health-check
version: 0.1.0
description: >-
  Simulate the monitor's quality health check on a named agent: returns the
  canned deterministic quality metrics (`quality_score` + `symptom`) for the
  agent and records one auditable `{system: monitor, action: health_check}`
  row to the shared sim_side_effects ledger (same DB MDK itself uses).
  SELF-CONTAINED for the deployed temporal-worker image (ADR 097 D2): the
  implementation lives in impl.py next to this file — the python backend
  puts the skill dir's parent on sys.path, so `sim-health-check.impl`
  imports from the baked workflows/ tree without certification/ being
  present.

schema:
  input: ./schema/input.json
  output: ./schema/output.json

implementation:
  kind: python
  entry: "sim-health-check.impl:run"

cost:
  per_call_usd: 0.0

side_effects: mutates-state

tags:
  - monitoring
  - simulation
  - certification
