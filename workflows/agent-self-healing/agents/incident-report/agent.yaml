api_version: movate/v1
kind: Agent
name: incident-report
version: 0.1.0
description: >-
  Files the incident report when a degraded agent could not heal itself —
  the automated fix failed and a human operator acknowledged the escalation.
model:
  provider: openai/gpt-4o-mini
  params: {temperature: 0.0}
prompt: ./prompt.md
schema: {input: ./schema/input.json, output: ./schema/output.json}
evals: {dataset: ./evals/dataset.jsonl}
