api_version: movate/v1
kind: Agent
name: kb-researcher
version: 0.1.0
description: >-
  Calibrated sim of an internal knowledge-base researcher: answers ONLY from
  its embedded KB corpus, clearly labeling its findings.
model:
  provider: openai/gpt-4o-mini
  params: {temperature: 0.0}
prompt: ./prompt.md
schema: {input: ./schema/input.json, output: ./schema/output.json}
evals: {dataset: ./evals/dataset.jsonl}
