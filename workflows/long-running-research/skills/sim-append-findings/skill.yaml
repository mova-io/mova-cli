api_version: movate/v1
kind: Skill

name: sim-append-findings
version: 0.1.0
description: >-
  Simulate appending one research increment to the accumulating research
  log: records one auditable `{system: research, action: append}` row
  (payload carries the increment number + a findings excerpt) to the shared
  sim_side_effects ledger (same DB MDK itself uses) and returns a one-line
  confirmation — the row a cron-scheduled series builds up fire by fire.
  SELF-CONTAINED for the deployed temporal-worker image (ADR 097 D2): the
  implementation lives in impl.py next to this file — the python backend
  puts the skill dir's parent on sys.path, so `sim-append-findings.impl`
  imports from the baked workflows/ tree without certification/ being
  present.

schema:
  input: ./schema/input.json
  output: ./schema/output.json

implementation:
  kind: python
  entry: "sim-append-findings.impl:run"

cost:
  per_call_usd: 0.0

side_effects: mutates-state

tags:
  - research
  - schedules
  - simulation
  - certification
