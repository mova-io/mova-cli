api_version: movate/v1
kind: Agent

name: manager
version: 0.1.0
description: Routes movate-cli FAQ questions into one of three expert lanes.
owner: ""

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 64
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  input: ./schema/input.json
  output: ./schema/output.json

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 15000
  total_ms: 30000

budget:
  max_cost_usd_per_run: 0.10

# Per-objective gating (v0.7). Each objective declares its own
# threshold; `mdk eval --objective routing-accuracy` gates on this
# value, independent of the eval-wide --gate.
objectives:
  - id: routing-accuracy
    description: Percent of questions correctly routed to the expert lane
    threshold: 0.9
    judge: exact

tags:
  - classifier
