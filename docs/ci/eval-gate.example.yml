# Example: gate PRs on movate eval scores.
#
# NOTE: this file lives in docs/ (NOT .github/workflows/) on purpose — GitHub
# only runs workflows physically located in .github/workflows/, so keeping the
# example here means it never executes as a gate in THIS repo. Copy it into your
# *consumer* repo (the repo holding your agents) at `.github/workflows/eval-gate.yml`
# and commit. Post-Sprint-W (May 2026)
# the workflow uses `mdk eval --all` so it sweeps every agent in
# `agents/` without a matrix entry per agent — adding a new agent is
# zero CI churn.
#
# The workflow has two jobs:
#
#   1. `gate-pr` — runs on every PR. Calls `mdk eval --all --mock --gate
#      <threshold>`. Exits non-zero if ANY agent's mean score falls below
#      the gate. Greppable `mdk_eval_all_summary:` line is emitted to the
#      step log so CI dashboards can scrape pass/fail without parsing
#      the table.
#
#   2. `refresh-baseline` — runs on push to main. Per-agent: writes the
#      new baseline JSON back into `.movate/<agent>/baseline.json` and
#      commits the refreshed baselines. (Still per-agent because the
#      baseline file is per-agent — `mdk eval --all` doesn't write a
#      composite baseline today.)
#
# Hermetic mode (--mock) is the default so the gate doesn't need API keys.
# For real-model evals, set provider keys in repo secrets and remove --mock.

name: eval-gate

on:
  pull_request:
    paths:
      - "agents/**"
      - ".movate/**"
  push:
    branches: [main]
    paths:
      - "agents/**"

jobs:
  # -------------------------------------------------------------------------
  # PR gate: sweep every agent in agents/; fail if any gate breaks.
  # -------------------------------------------------------------------------
  gate-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install movate
        # `uv tool install` puts the `mdk` CLI on PATH without touching the
        # runner's externally-managed system Python (avoids the PEP 668
        # "externally managed" error that `uv pip install --system` hits).
        run: uv tool install movate-cli

      - name: Run mdk eval --all
        # Exits 1 if any agent's mean score falls below --gate.
        # Tune the gate threshold to your team's quality bar. The
        # `mdk_eval_all_summary:` line in the step log is the
        # greppable verdict (`ok=true` / `ok=false`).
        run: |
          mdk eval --all --mock --gate 0.7

      - name: Annotate PR with summary
        if: always()
        run: |
          # Pull the greppable summary line back out of the previous
          # step's logs would require a roundtrip; instead re-emit
          # the summary by running mdk eval --all once more in JSON
          # mode (cheap with --mock).
          echo "## movate eval --all" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          mdk eval --all --mock --gate 0.0 2>&1 \
            | grep "mdk_eval_all_summary:" \
            >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # -------------------------------------------------------------------------
  # Main-branch refresh: write the new baseline back into the repo.
  # -------------------------------------------------------------------------
  refresh-baseline:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to commit the refreshed baseline
    strategy:
      matrix:
        agent:
          - faq-agent
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install movate
        # `uv tool install` puts the `mdk` CLI on PATH without touching the
        # runner's externally-managed system Python (avoids the PEP 668
        # "externally managed" error that `uv pip install --system` hits).
        run: uv tool install movate-cli

      - name: Refresh baseline
        run: |
          uv run movate eval "./agents/${{ matrix.agent }}" \
            --mock \
            --gate 0.0 \
            --output-baseline ".movate/${{ matrix.agent }}/baseline.json"

      - name: Commit refreshed baseline
        run: |
          git config user.name "movate-bot"
          git config user.email "bot@movate.com"
          if ! git diff --quiet ".movate/${{ matrix.agent }}/baseline.json"; then
            git add ".movate/${{ matrix.agent }}/baseline.json"
            git commit -m "chore(eval): refresh ${{ matrix.agent }} baseline"
            git push
          else
            echo "baseline unchanged"
          fi
