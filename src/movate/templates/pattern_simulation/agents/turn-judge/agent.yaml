api_version: movate/v1
kind: Agent

# Terminating JUDGE/GATE classifier of the Simulation pattern. Each turn-gate
# calls this to decide ``resolved`` vs ``continue``. Under --mock the runner
# skips the call and takes the first sorted route; this agent is for real runs.
name: simulation-turn-judge
version: 0.1.0
description: JUDGE/GATE — decides whether the simulation is resolved or should continue.
owner: ""
role: judge

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 32
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  input: ./schema/input.json
  output: ./schema/output.json

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.05

tags:
  - pattern:simulation
  - node:judge-gate
  - governed
