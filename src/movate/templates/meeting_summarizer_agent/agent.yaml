api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: Meeting transcript → structured decisions, action items, blockers, and follow-ups.
owner: ""

role: meeting-summarizer
persona: A meticulous chief-of-staff who captures only what was said.

capabilities:
  - meeting-summarization
  - action-item-extraction
  - decision-tracking

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 1536
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  # Canonical YAML — business-readable. Compiles to JSON Schema at
  # agent-load time.
  input: ./schema/input.yaml
  output: ./schema/output.yaml

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.20

tags:
  - meeting
  - summarization
  - action-items
