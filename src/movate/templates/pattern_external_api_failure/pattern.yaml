# Pattern registry metadata — consumed by movate.templates at import time
# to build PATTERN_TEMPLATES (auto-discovery; no central dict to edit).
# NOT copied into user scaffolds by `mdk init --pattern` (the name
# `pattern.yaml` is reserved + excluded from the copy).
name: external-api-failure
kind: workflow
description: 'Retries + fallback provider with OBSERVABLE activity retries (runtime: temporal).
  A flaky TOOL entrypoint records one ledger attempt row per invocation and raises while attempts
  <= fail_times — so ledger rows = Temporal retry attempts (max 3); transient failures recover
  via the durable retry (the fallback provider serves them), exhaustion fails the workflow
  loudly with zero downstream record rows (ADR 094/097/098).'
topology: TOOL flaky-call ⟳3 → DECISION(provider_ok) → shared TOOL record → notify | failed
