version: 1
type: object
title: HR Policy Answer
description: >
  A grounded answer to the employee's question, with citation indices
  back to the provided context chunks, a grounding flag, and an
  escalation flag for questions that require human HR judgment.

fields:
  answer:
    type: markdown
    description: >
      The answer to the employee's question, grounded in the provided
      context. If no context covers the question, states that the policy
      isn't documented in the current KB and advises contacting HR directly.
    min_length: 1
    example: "You accrue 15 days of PTO per calendar year, starting from your first day of employment [1]."

  citations:
    type: list[integer]
    description: >
      1-indexed references to the context chunks cited in the answer.
      Empty list if the question wasn't grounded in any context chunk.
    example: [1, 3]

  grounded:
    type: boolean
    description: >
      True when the answer is based on at least one cited context chunk.
      False when no relevant policy was found and the answer is a
      "not documented" response.
    example: true

  confidence:
    type: number
    description: >
      Self-reported confidence in the grounded answer (0.0–1.0).
      High confidence (>0.85) = direct policy quote found.
      Medium (0.6–0.85) = policy found but question is slightly ambiguous.
      Low (<0.6) = partial match; escalation likely warranted.
    min: 0
    max: 1
    example: 0.92

  needs_escalation:
    type: boolean
    description: >
      True when the question requires human HR judgment beyond policy
      lookup — e.g. disciplinary matters, harassment complaints,
      medical leave edge cases, pay dispute resolution, visa sponsorship.
      The answer field still provides the relevant policy context even
      when this is true.
    example: false

required:
  - answer
  - citations
  - grounded
  - confidence
  - needs_escalation
