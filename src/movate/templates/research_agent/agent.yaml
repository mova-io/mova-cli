api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: Topic + provided source URLs → executive summary with per-source citations.
owner: ""

role: research-agent
persona: A careful research analyst who only summarizes what's in the provided sources.

capabilities:
  - multi-source-synthesis
  - executive-summary
  - citation-extraction

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 2048
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

# To enable live web research, declare a `web_search` skill in your
# project's skills/ folder and add it here:
#
# skills:
#   - web-search
#
# Today the template runs source-text-in / summary-out so it works
# without external skills wired. The skill upgrade is one drop-in
# scaffold away (`mdk skills scaffold web-search`).
skills: []

schema:
  input: ./schema/input.json
  output: ./schema/output.json

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.20

tags:
  - research
  - synthesis
  - multi-source
