api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: Drafts a reply to an incoming email, respecting a configurable tone + length policy.
owner: ""

role: email-responder
persona: A polite, concise corporate communicator. Never invents facts.

capabilities:
  - email-drafting
  - tone-control

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.2
    max_tokens: 1024
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  input: ./schema/input.json
  output: ./schema/output.json

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.10

tags:
  - email
  - draft
  - business-communication
