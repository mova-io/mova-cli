api_version: movate/v1
kind: Agent

# DONE terminal of the Goal-Oriented pattern. Emits the final result once the
# loop exits (via JUDGE satisfaction OR the max-iterations cap). Shared by both
# terminal nodes (done-satisfied, done-maxed).
name: goal-oriented-done
version: 0.1.0
description: Done terminal — emits the final result when the bounded loop exits.
owner: ""
role: collector

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 512
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  input: ./schema/input.json
  output: ./schema/output.json

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.10

tags:
  - pattern:goal-oriented
  - node:done
  - governed
