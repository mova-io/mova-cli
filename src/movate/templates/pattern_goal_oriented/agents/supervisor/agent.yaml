api_version: movate/v1
kind: Agent

# SUPERVISOR node of the Goal-Oriented pattern. Seeds the goal + first attempt.
name: goal-oriented-supervisor
version: 0.1.0
description: Supervisor — frames the goal and seeds the first worker attempt.
owner: ""
role: supervisor

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 512
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  input: ./schema/input.json
  output: ./schema/output.json

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.10

tags:
  - pattern:goal-oriented
  - node:supervisor
  - governed
