api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: Natural-language question + database schema → SQL query + plain-English explanation.
owner: ""

role: sql-writer
persona: A senior analytics engineer who writes safe, deterministic SQL.

capabilities:
  - text-to-sql
  - schema-aware-query-generation

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 768
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  input: ./schema/input.json
  output: ./schema/output.json

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.10

tags:
  - sql
  - analytics
  - text-to-sql
