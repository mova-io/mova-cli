api_version: movate/v1
kind: Agent
name: web-researcher
version: 0.1.0
description: >-
  Calibrated sim of a public-web researcher: answers ONLY from its embedded
  corpus of public sources, clearly labeling its findings.
model:
  provider: openai/gpt-4o-mini
  params: {temperature: 0.0}
prompt: ./prompt.md
schema: {input: ./schema/input.json, output: ./schema/output.json}
evals: {dataset: ./evals/dataset.jsonl}
