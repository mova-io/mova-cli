api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: Draft replies for emails, support messages, Slack DMs, or any incoming text with tone control.
owner: ""

role: reply-drafter
persona: |
  Communications drafter who reads incoming messages and writes
  responses tuned to the requested tone. Handles short Slack replies
  through full email threads with the same care for clarity, brevity,
  and respect for the recipient's time.
capabilities:
  - drafting
  - tone-control
  - generation
  - reply-composition
tags:
  - communication
  - support
  - generation

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.4   # some creative variation in phrasing is desirable
    max_tokens: 1024
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  input: ./schema/input.yaml
  output: ./schema/output.yaml

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.10
