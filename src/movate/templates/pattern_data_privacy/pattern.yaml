  documents are masked by the redact-pii TOOL first; ALL paths converge on one sim-audit-store
  TOOL recording the classification-keyed audit row no path can skip (ADR 094/097/098).'
topology: classify → DECISION(classification) → {TOOL redact → TOOL audit-store | TOOL audit-store}
  → summary
