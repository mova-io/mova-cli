api_version: movate/v1
kind: Skill

name: sim-audit-store
version: 0.1.0
description: >-
  Simulate classification-keyed audited storage: records ONE auditable
  `{system: dlp, action: store_<classification>}` row (store_public /
  store_internal / store_regulated) to the shared sim_side_effects ledger
  (same DB MDK itself uses) and returns a one-line confirmation — the
  compliance trail EVERY data-privacy path must leave. The action is derived
  1:1 from the enum-pinned `classification` input; an out-of-vocabulary
  value fails the dispatch_skill input validation loudly. SELF-CONTAINED for
  the deployed temporal-worker image (ADR 097 D2): the implementation lives
  in impl.py next to this file — the python backend puts the skill dir's
  parent on sys.path, so `sim-audit-store.impl` imports from the baked
  workflows/ tree without certification/ being present.

schema:
  input: ./schema/input.json
  output: ./schema/output.json

implementation:
  kind: python
  entry: "sim-audit-store.impl:run"

cost:
  per_call_usd: 0.0

side_effects: mutates-state

tags:
  - dlp
  - simulation
  - certification
