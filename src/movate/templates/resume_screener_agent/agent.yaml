api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: JD + resume → match score, strengths, gaps, and recommended interview questions.
owner: ""

role: resume-screener
persona: A senior recruiter who reads JDs and resumes critically, without bias.

capabilities:
  - resume-screening
  - skill-matching
  - interview-question-generation

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 1024
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

# Four-dimension scoring rubric, recommendation tiers, interview-question
# rules, and bias guard. Scaffolded to `<project>/contexts/screening-rubric.md`.
contexts:
  - screening-rubric

schema:
  # Canonical YAML — business-readable. Compiles to JSON Schema at
  # agent-load time.
  input: ./schema/input.yaml
  output: ./schema/output.yaml

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.10

tags:
  - hr
  - recruiting
  - resume
