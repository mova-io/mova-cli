# ============================================================================
# MDK Canonical Schema — Lead Qualifier (output)
# ============================================================================
# What the lead-qualifier agent returns after scoring an inbound lead.
# BANT (Budget / Authority / Need / Timeline) — each dimension scored 0-3
# with a one-line rationale. Total feeds the next_action recommendation.

version: 1
type: object

title: Lead Qualification Result
description: >
  BANT scoring across budget, authority, need, and timeline.
  Total drives the recommended next sales action.

# Reusable shape — declared once, referenced from every BANT dimension.
# Each compiles to a `$ref` in the JSON Schema output.
types:

  scoring:
    type: object
    description: A 0–3 score with a one-line rationale.
    fields:
      score:
        type: integer
        description: 0 = none / weak, 3 = clearly meets the criterion.
        min: 0
        max: 3
      rationale:
        type: string
        description: One short sentence explaining the score.
        min: 1
        max: 200
    required: [score, rationale]

fields:

  bant:
    type: object
    description: BANT scoring breakdown — four dimensions, each 0-3.
    fields:
      budget:
        type: scoring
        description: Budget fit (3 = clearly has budget; 0 = no signal).
      authority:
        type: scoring
        description: Decision-maker authority (3 = the buyer; 0 = junior).
      need:
        type: scoring
        description: Pain / need match (3 = explicit pain; 0 = curiosity).
      timeline:
        type: scoring
        description: Buying timeline (3 = this quarter; 0 = no timeline).
    required: [budget, authority, need, timeline]

  total_score:
    type: integer
    description: Sum of the four BANT scores. Drives next_action.
    min: 0
    max: 12

  next_action:
    type: enum
    description: Recommended next sales action based on the total score.
    values:
      - book_meeting       # Score ≥9 — book a sales meeting
      - nurture            # Score 5-8 — drip campaign + content
      - enrich             # Score 3-4 — enrich data, requalify
      - disqualify         # Score 0-2 — not a fit

  rationale:
    type: markdown
    description: One-paragraph plain-English explanation of the score + action.
    min: 1
    max: 600

  objections:
    type: list[string]
    description: Buyer objections detected in the message (zero or more).

required:
  - bant
  - total_score
  - next_action
  - rationale
  - objections
