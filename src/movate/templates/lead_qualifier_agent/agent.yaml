api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: Scores an inbound lead on BANT (budget, authority, need, timeline) + recommends a next action.
owner: ""

role: lead-qualifier
persona: A pragmatic SDR who scores leads quickly and routes them.

capabilities:
  - lead-scoring
  - bant-classification
  - next-best-action

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 768
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  # Shorthand YAML — human-readable; compiled to JSON Schema at load
  # time (ranges/enums/refs in one line each). Legacy ./schema/*.json
  # files still work if you'd rather hand-write the full JSON Schema.
  input: ./schema/input.yaml
  output: ./schema/output.yaml

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.10

tags:
  - sales
  - bant
  - lead-scoring
