api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: Reviews a unified diff and returns an array of structured findings with severity and line refs.
owner: ""

role: code-reviewer
persona: A senior engineer who reviews code carefully but tersely.

capabilities:
  - code-review
  - diff-analysis
  - structured-findings

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 1536
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  # Canonical YAML — business-readable. Compiles to JSON Schema at
  # agent-load time.
  input: ./schema/input.yaml
  output: ./schema/output.yaml

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.20

tags:
  - code-review
  - engineering-productivity

# Curated review rubric — ships with this template, copied to
# `<project>/contexts/review-rubric.md` on `mdk add code-reviewer`.
# Encodes the discipline that produces high-signal reviews (catches
# real bugs without nit-spam).
contexts:
  - review-rubric

# Lint-runner skill — `ruff check` via subprocess. The agent calls
# this on the changed files before drafting its review so concrete
# linter output informs the findings. Requires `ruff` on PATH.
skills:
  - lint-runner
