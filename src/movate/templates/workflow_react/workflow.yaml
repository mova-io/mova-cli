# ============================================================================
# MDK Workflow — ReAct Loop (reason-act-observe cycle)
# ============================================================================
# A LangGraph-native ReAct pattern where a reasoner thinks step-by-step,
# decides whether to use a tool (research agent) or declare the answer
# sufficient, and loops back if not. Demonstrates cycle edges and
# intent-router conditional branching.
#
# Flow:
#   reasoner  — thinks step-by-step, emits intent ("search" or "done")
#   researcher — looks up information, feeds results back to reasoner
#   summarizer — produces the final answer once reasoning is complete
#
# The cycle (reasoner -> researcher -> reasoner) continues until the
# reasoner emits intent "done", at which point the summarizer produces
# the final output.

api_version: movate/v1
kind: Workflow

name: workflow-react
version: 0.1.0
description: |
  ReAct loop demonstrating LangGraph cycle edges and intent-router
  conditional branching. A reasoner agent thinks step-by-step, optionally
  delegates to a researcher for information gathering, and loops until
  the answer is sufficient. A summarizer produces the final output.
owner: ""

runtime: langgraph

state_schema: ./state.json

entrypoint: reasoner

evals:
  dataset: ./evals/dataset.jsonl
  gate: 0.7

nodes:
  - id: reasoner
    type: agent
    ref: ./agents/reasoner

  - id: researcher
    type: agent
    ref: ./agents/researcher

  - id: summarizer
    type: agent
    ref: ./agents/summarizer

edges:
  # The reasoner emits an intent field — route conditionally.
  - from: reasoner
    kind: intent-router
    field: intent
    routes:
      search: researcher
      done: summarizer

  # Researcher feeds results back into the reasoner (cycle edge).
  - from: researcher
    to: reasoner

tags:
  - react
  - workflow
  - langgraph
  - cycle
