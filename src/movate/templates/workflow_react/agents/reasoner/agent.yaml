api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: |
  Reasoner node for the ReAct loop. Thinks step-by-step about the
  question, decides whether to search for more information or declare
  the answer ready. Emits an intent ("search" or "done") that the
  workflow's intent-router uses to branch.
owner: ""

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.7
    max_tokens: 512
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  input: ./schema/input.yaml
  output: ./schema/output.yaml

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.20

tags:
  - workflow
  - react
  - reasoner
