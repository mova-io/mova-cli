# ============================================================================
# Reasoner node — output schema
# ============================================================================
# The reasoner produces updated reasoning, an intent decision, an
# optional search query, and the incremented iteration count.

version: 1
type: object

title: Reasoner Node Output

fields:

  reasoning:
    type: string
    description: Accumulated step-by-step reasoning.
    example: "The question asks about microservices vs monoliths. I should look up concrete trade-offs."

  intent:
    type: string
    description: Next action — "search" to invoke the researcher, "done" to finalize.
    enum: ["search", "done"]
    example: search

  search_query:
    type: string
    description: Query for the researcher agent (required when intent is "search").
    example: "microservices vs monolith trade-offs"

  iteration:
    type: integer
    description: Incremented loop count.
    example: 1

required:
  - reasoning
  - intent
  - iteration
