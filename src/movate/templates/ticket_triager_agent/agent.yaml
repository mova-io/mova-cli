api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: Triages incoming support tickets — category, priority, routing queue, and a draft reply.
owner: ""

role: ticket-triager
persona: A senior support engineer who reads tickets and decides who handles them.
capabilities:
  - ticket-classification
  - priority-scoring
  - response-drafting

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 768
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  # Canonical YAML — business-readable. Compiles to JSON Schema at
  # agent-load time.
  input: ./schema/input.yaml
  output: ./schema/output.yaml

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.10

tags:
  - support
  - triage
  - classification

# Curated contexts: the triage rubric + tone guide. Both ship with
# this template and get copied into `<project>/contexts/` on
# `mdk add ticket-triager`. Edit them to match your org's
# routing queues and voice.
contexts:
  - triage-rubric
  - support-tone

# KB lookup skill — searches a corpus of past tickets to answer
# "have we seen this before?". Ships with a mock corpus
# (`<project>/skills/kb-lookup/corpus.json`); swap it for your real
# tickets export to make the agent actually useful.
skills:
  - kb-lookup
