# ============================================================================
# MDK Canonical Schema — Chatbot Agent (output)
# ============================================================================

version: 1
type: object

title: Chat Turn (Output)
description: >
  The assistant's reply for this turn. `mdk chat` renders this to the
  user and (when memory is on) appends it to conversation history as
  the assistant message.

fields:

  reply:
    type: markdown
    description: The assistant's reply for this turn.
    min_length: 1
    example: You can export to CSV from Settings → Data → Export → choose CSV.

required:
  - reply
