api_version: movate/v1
kind: Skill

name: sim-gather-incidents
version: 0.1.0
description: >-
  Simulate the incident source of the executive briefing: returns a canned,
  deterministic open-incident list keyed by the `profile` knob (steady |
  degraded; missing → steady — steady is an EMPTY list) and records one
  auditable `{system: incidents, action: gather}` row to the shared
  sim_side_effects ledger (same DB MDK itself uses). NEVER does network IO.
  SELF-CONTAINED for the deployed temporal-worker image (ADR 097 D2): the
  implementation lives in impl.py next to this file — the python backend
  puts the skill dir's parent on sys.path, so `sim-gather-incidents.impl`
  imports from the baked workflows/ tree without certification/ being
  present.

schema:
  input: ./schema/input.json
  output: ./schema/output.json

implementation:
  kind: python
  entry: "sim-gather-incidents.impl:run"

cost:
  per_call_usd: 0.0

side_effects: mutates-state

tags:
  - reporting
  - simulation
  - certification
