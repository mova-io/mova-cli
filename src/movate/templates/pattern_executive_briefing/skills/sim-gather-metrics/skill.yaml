api_version: movate/v1
kind: Skill

name: sim-gather-metrics
version: 0.1.0
description: >-
  Simulate the metrics source of the executive briefing: returns a canned,
  deterministic business-metrics snapshot (runs, success rate, cost vs
  budget, p95 latency) keyed by the `profile` knob (steady | degraded;
  missing → steady) and records one auditable `{system: metrics, action:
  gather}` row to the shared sim_side_effects ledger (same DB MDK itself
  uses). NEVER does network IO. SELF-CONTAINED for the deployed
  temporal-worker image (ADR 097 D2): the implementation lives in impl.py
  next to this file — the python backend puts the skill dir's parent on
  sys.path, so `sim-gather-metrics.impl` imports from the baked workflows/
  tree without certification/ being present.

schema:
  input: ./schema/input.json
  output: ./schema/output.json

implementation:
  kind: python
  entry: "sim-gather-metrics.impl:run"

cost:
  per_call_usd: 0.0

side_effects: mutates-state

tags:
  - reporting
  - simulation
  - certification
