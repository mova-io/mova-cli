api_version: movate/v1
kind: Agent

# Task branch B — the second (and last) capped branch in the Task-Oriented pattern.
name: task-oriented-task-b
version: 0.1.0
description: Task branch B — executes the second of the two capped tasks.
owner: ""
role: worker

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 512
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  input: ./schema/input.json
  output: ./schema/output.json

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.10

tags:
  - pattern:task-oriented
  - node:task
  - governed
