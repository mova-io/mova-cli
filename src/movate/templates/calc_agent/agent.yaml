api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: >-
  Evaluates arithmetic expressions step by step and explains the result.
  Demonstrates a Python skill wired to an agent.
owner: ""

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 512
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  input: ./schema/input.yaml
  output: ./schema/output.yaml

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 15000
  total_ms: 30000

budget:
  max_cost_usd_per_run: 0.10

tags:
  - calculator
  - demo
  - skill-using

# The `calculator` skill evaluates the expression and returns the numeric
# result. The agent explains the calculation in plain English.
# Run `mdk validate` to confirm the skill is wired correctly.
skills:
  - calculator
