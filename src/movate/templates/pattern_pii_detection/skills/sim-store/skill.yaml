api_version: movate/v1
kind: Skill

name: sim-store
version: 0.1.0
description: >-
  Simulate storing a PII-clean document: records one auditable
  `{system: dlp, action: store_clean}` row to the shared sim_side_effects
  ledger (same DB MDK itself uses) and returns a one-line confirmation.
  SELF-CONTAINED for the deployed temporal-worker image (ADR 097 D2): the
  implementation lives in impl.py next to this file — the python backend
  puts the skill dir's parent on sys.path, so `sim-store.impl` imports from
  the baked workflows/ tree without certification/ being present.

schema:
  input: ./schema/input.json
  output: ./schema/output.json

implementation:
  kind: python
  entry: "sim-store.impl:run"

cost:
  per_call_usd: 0.0

side_effects: mutates-state

tags:
  - dlp
  - simulation
  - certification
