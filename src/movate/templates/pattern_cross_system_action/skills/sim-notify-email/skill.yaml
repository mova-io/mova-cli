api_version: movate/v1
kind: Skill

name: sim-notify-email
version: 0.1.0
description: >-
  Simulate sending the completion notification email for the requested
  action: records one auditable `{system: email, action: send}` row to the
  shared sim_side_effects ledger (same DB MDK itself uses) and returns a one-
  line confirmation. SELF-CONTAINED for the deployed temporal-worker image
  (ADR 097 D2): the implementation lives in impl.py next to this file — the
  python backend puts the skill dir's parent on sys.path, so `sim-notify-
  email.impl` imports from the baked workflows/ tree without certification/
  being present.

schema:
  input: ./schema/input.json
  output: ./schema/output.json

implementation:
  kind: python
  entry: "sim-notify-email.impl:run"

cost:
  per_call_usd: 0.0

side_effects: mutates-state

tags:
  - email
  - simulation
  - certification
