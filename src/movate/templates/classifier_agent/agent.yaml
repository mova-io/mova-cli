api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: Classifies input text into one of a fixed list of labels.
owner: ""

# runtime selects the LLM execution path. Options:
#   litellm          — default; routes through LiteLLM (100+ providers)
#   native_anthropic — direct Anthropic SDK (tool-use, prompt caching, vision)
#   native_openai    — direct OpenAI SDK (structured outputs, parallel tool-use)
runtime: litellm

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 64
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  # Canonical YAML — business-readable. Compiles to JSON Schema at
  # agent-load time.
  input: ./schema/input.yaml
  output: ./schema/output.yaml

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 15000
  total_ms: 30000

budget:
  max_cost_usd_per_run: 0.10

tags:
  - classifier
