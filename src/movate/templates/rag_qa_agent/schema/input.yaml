# ============================================================================
# MDK Canonical Schema — RAG QA (input)
# ============================================================================
# Question + retrieved-context pairs for a Retrieval-Augmented
# Generation answering agent. The agent answers FROM the context — it
# should refuse to answer when the context doesn't support a reply
# (set `grounded: false` and route to a human).

version: 1
type: object

title: RAG QA Input
description: >
  One question plus retrieved context chunks. Context chunks are
  passed in 1-indexed order (chunk #1, #2, etc.) so the agent can
  cite them precisely in its answer.

fields:

  question:
    type: string
    description: The user's question to answer.
    min_length: 1
    example: What is our refund policy for annual subscriptions?

  context:
    type: list[string]
    description: >
      Retrieved context chunks the model should answer from.
      Indexed 1..N; the agent's output cites these by index.
    min_items: 1
    example:
      - >
        Our refund policy: annual subscriptions are refundable within
        the first 14 days of purchase, prorated by the unused portion.
      - >
        Refunds are issued back to the original payment method within
        5-7 business days of the request.

required:
  - question
  - context
