# ============================================================================
# MDK Canonical Schema — RAG QA (output)
# ============================================================================
# The agent's grounded answer plus citation indices into the input
# context. `grounded: false` is the "I can't answer from the context"
# signal — apps should route those to a human.

version: 1
type: object

title: RAG QA Answer
description: >
  Grounded answer with citations back to the input context chunks.
  `grounded: false` + empty `citations` means the agent didn't find
  enough in the context to answer; apps should route those tickets
  for human review rather than showing the answer directly.

fields:

  answer:
    type: markdown
    description: The answer to the user's question, grounded in context.
    min_length: 1
    example: >
      Annual subscriptions are refundable within the first 14 days
      of purchase, prorated by the unused portion. Refunds go back
      to your original payment method within 5-7 business days.

  citations:
    type: list[integer]
    description: >
      1-indexed citation references back to the input `context` array.
      Empty when `grounded` is false.
    example: [1, 2]

  grounded:
    type: boolean
    description: >
      True when the agent answered from the context; false when the
      context didn't support a confident answer (the agent declined
      to fabricate).
    example: true

  confidence:
    type: number
    description: Self-reported confidence in the grounded answer (0-1).
    min: 0
    max: 1
    example: 0.94

required:
  - answer
  - citations
  - grounded
  - confidence
