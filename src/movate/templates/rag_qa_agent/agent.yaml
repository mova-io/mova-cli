api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: Answers questions grounded in provided context. Returns the answer plus citation spans.
owner: ""

role: rag-qa
persona: A careful research assistant that only answers from provided context.
capabilities:
  - retrieval-qa
  - citation-extraction
  - grounded-answer

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 1024
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  # Canonical YAML — business-readable. Compiles to JSON Schema at
  # agent-load time.
  input: ./schema/input.yaml
  output: ./schema/output.yaml

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.10

tags:
  - rag
  - qa
  - grounded

# Reusable Markdown context (prepended to every prompt) — ships with
# this template; `mdk add rag-qa` auto-copies it into the project's
# `contexts/` dir. Edit `contexts/grounded-qa-rubric.md` to tune the
# discipline; the agent re-reads on every run.
contexts:
  - grounded-qa-rubric

# External skills the agent can call:
# - kb-vector-lookup: semantic search over this agent's KB. Pair
#   with ``mdk kb ingest rag-qa agents/rag-qa/kb`` to populate, then
#   the agent retrieves relevant chunks at run time when the caller
#   doesn't pass ``context`` explicitly.
# - web-search: fallback when neither the passed context nor the KB
#   answers the question. DuckDuckGo HTML scrape under the hood.
# Both auto-scaffold under ``<project>/skills/`` on ``mdk add rag-qa``.
skills:
  - kb-vector-lookup
  - web-search
