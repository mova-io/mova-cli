api_version: movate/v1
kind: Agent

# VALIDATE/GATE classifier of the Monitor pattern. The threshold-gate router
# calls this to decide ``breach`` vs ``ok``. Under --mock the runner skips the
# call and takes the first sorted route; this agent is for real runs.
name: monitor-threshold-judge
version: 0.1.0
description: VALIDATE/GATE — decides whether the metric breaches the threshold.
owner: ""
role: judge

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 32
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  input: ./schema/input.json
  output: ./schema/output.json

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.05

tags:
  - pattern:monitor
  - node:validate-gate
  - governed
