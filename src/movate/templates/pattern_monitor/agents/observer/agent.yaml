api_version: movate/v1
kind: Agent

# OBSERVER node of the Monitor pattern. Normalizes the raw signal into a metric.
name: monitor-observer
version: 0.1.0
description: Observer — reads the incoming signal and normalizes it into a metric.
owner: ""
role: observer

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 256
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  input: ./schema/input.json
  output: ./schema/output.json

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.05

tags:
  - pattern:monitor
  - node:observer
  - governed
