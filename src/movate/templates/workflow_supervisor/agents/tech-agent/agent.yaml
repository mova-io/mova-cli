api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: |
  Technical support specialist agent. Handles API errors, integration
  issues, performance problems, and outage-related queries routed by
  the supervisor.
owner: ""

model:
  provider: openai/gpt-4o-mini-2024-07-18
