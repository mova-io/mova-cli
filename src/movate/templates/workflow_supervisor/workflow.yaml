# ============================================================================
# MDK Workflow — Supervisor (intent-router to specialist agents)
# ============================================================================
# A LangGraph-native supervisor pattern where a supervisor agent classifies
# the user's query intent and routes to the appropriate specialist agent.
# Demonstrates intent-router conditional branching with multiple targets.
#
# Flow:
#   supervisor     — classifies intent into billing / tech / general
#   billing-agent  — handles billing and payment questions
#   tech-agent     — handles technical support questions
#   general-agent  — handles general inquiries and fallback

api_version: movate/v1
kind: Workflow

name: workflow-supervisor
version: 0.1.0
description: |
  Supervisor pattern demonstrating LangGraph intent-router with multiple
  specialist agents. A supervisor classifies the user's query and routes
  to the appropriate specialist (billing, tech, or general). Each
  specialist produces a self-contained response.
owner: ""

runtime: langgraph

state_schema: ./state.json

entrypoint: supervisor

evals:
  dataset: ./evals/dataset.jsonl
  gate: 0.7

nodes:
  - id: supervisor
    type: agent
    ref: ./agents/supervisor

  - id: billing-agent
    type: agent
    ref: ./agents/billing-agent

  - id: tech-agent
    type: agent
    ref: ./agents/tech-agent

  - id: general-agent
    type: agent
    ref: ./agents/general-agent

edges:
  # The supervisor emits a category field — route to the matching specialist.
  - from: supervisor
    kind: intent-router
    field: category
    routes:
      billing: billing-agent
      tech: tech-agent
      general: general-agent

tags:
  - supervisor
  - workflow
  - langgraph
  - intent-router
  - multi-agent
