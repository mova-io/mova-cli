api_version: movate/v1
kind: Workflow
name: expense-approval
version: 0.1.0
description: >
  Tiered expense approval, durable on Temporal. The amount tier routes on a
  deterministic `decision` node (ADR 094) — no LLM, no Temporal activity — then
  each tier pauses durably at a HUMAN approval gate; an LLM classifier reads the
  approver's free-text decision and routes approve→ERP-post or reject. Self-
  contained (bundled into the temporal-worker image): real LLM agents over
  simulated expense data, real durable execution + tracing (Temporal UI +
  Langfuse + Grafana). Mirrors certification/scenarios/expense-approval.
runtime: temporal
state_schema: ./state.json
entrypoint: classify
nodes:
  # Deterministic value routing on the expense amount (ADR 094) — replaces the
  # LLM tier-classifier the certification suite flagged as gap #47.
  - id: classify
    type: decision
    cases:
      - when: {field: amount, op: gt, value: 5000}
        to: director-approval
      - when: {field: amount, op: gt, value: 100}
        to: manager-approval
    default: post-erp-auto
  # --- auto tier (no approval) ---
  - {id: post-erp-auto, type: agent, ref: ./agents/erp-poster}
  - {id: finalize-auto, type: agent, ref: ./agents/finalize}
  # --- manager tier (>$0) ---
  - {id: manager-approval, type: human, prompt: "Approve this expense (manager)?", output_contract: [decision]}
  - id: manager-decision
    type: intent-router
    classifier_agent: ./agents/decision-classifier
    input_field: decision
    routes: {approve: post-erp-mgr, reject: rejected-mgr}
    fallback: rejected-mgr
  - {id: post-erp-mgr, type: agent, ref: ./agents/erp-poster}
  - {id: finalize-mgr, type: agent, ref: ./agents/finalize}
  - {id: rejected-mgr, type: agent, ref: ./agents/rejected}
  # --- director tier (>$5000) ---
  - {id: director-approval, type: human, prompt: "Approve this expense (director, >$5000)?", output_contract: [decision]}
  - id: director-decision
    type: intent-router
    classifier_agent: ./agents/decision-classifier
    input_field: decision
    routes: {approve: post-erp-dir, reject: rejected-dir}
    fallback: rejected-dir
  - {id: post-erp-dir, type: agent, ref: ./agents/erp-poster}
  - {id: finalize-dir, type: agent, ref: ./agents/finalize}
  - {id: rejected-dir, type: agent, ref: ./agents/rejected}
edges:
  - {from: post-erp-auto, to: finalize-auto}
  - {from: manager-approval, to: manager-decision}
  - {from: post-erp-mgr, to: finalize-mgr}
  - {from: director-approval, to: director-decision}
  - {from: post-erp-dir, to: finalize-dir}
tags:
  - temporal
  - decision
  - hitl
  - certification
